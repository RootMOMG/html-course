<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica 09 - Tablas</title>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody>
            <tr>    
                <td>Producto 1</td>
                <td>100</td>
                <td>10</td>
            </tr>
            <tr>    
                <td>Producto 2</td>
                <td>200</td>
                <td>20</td>
            </tr>
            <tr>    
                <td>Producto 3</td>
                <td>300</td>
                <td>30</td>
            </tr>
            <tr>    
                <td>Producto 4</td>
                <td>400</td>
                <td>40</td>
            </tr>
            <tr>    
                <td>Producto 5</td>
                <td>500</td>
                <td>50</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td>1500</td>
                <td>150</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
